{% extends "base.html" %}

{% block content %}

<div class="auth-box">

<h2>Login</h2>

<form method="POST">

<label>Email</label>
<input type="email" name="email" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

<p>Don't have an account?</p>

<a href="/register">Register</a>

</form>

</div>

{% endblock %}
